<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGV Animation Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Top load bar -->
  <div id="loadBar">
    <label>Layout JSON:</label>
    <input type="file" id="loadJson" accept=".json">
    <label>Background image:</label>
    <input type="file" id="loadImg" accept="image/*">
    <span id="loadStatus">No file loaded</span>
  </div>

  <!-- Main canvas (between the two bars) -->
  <canvas id="canvas"></canvas>

  <!-- Bottom player toolbar -->
  <div id="toolbar">
    <div class="toolbar-group">
      <button id="btnPlayPause">▶ Play</button>
      <button id="btnRestart">⟳ Restart</button>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <label>Speed</label>
      <select id="speedSelect">
        <option value="0.25">0.25×</option>
        <option value="0.5">0.5×</option>
        <option value="1" selected>1×</option>
        <option value="2">2×</option>
        <option value="4">4×</option>
      </select>
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <label>AGV px/s</label>
      <input type="number" id="agvSpeedInput" value="120" min="10" max="2000" style="width:70px;">
    </div>
    <div class="toolbar-group">
      <label>Action dur (s)</label>
      <input type="number" id="actionDurInput" value="1.5" min="0" max="30" step="0.1" style="width:65px;">
    </div>
    <div class="toolbar-sep"></div>
    <div class="toolbar-group">
      <label><input type="checkbox" id="showGrid" checked> Grid</label>
      <label><input type="checkbox" id="showLabels" checked> Labels</label>
    </div>
    <div class="toolbar-sep"></div>
    <span id="statusBadge" class="status-idle">IDLE</span>
    <span id="stepCounter">step 0 / 0</span>
    <div style="margin-left:auto;">
      <button id="btnRecord">⏺ Record</button>
    </div>
  </div>

  <!-- Home button (bottom-right) -->
  <a id="homeBtn" href="index.html" title="Home">⌂</a>

  <script src="shared.js"></script>
  <script src="animplayer.js"></script>
</body>
</html>
