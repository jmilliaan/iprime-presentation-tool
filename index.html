<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPrime Presentation Tool</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      overflow: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #f0f0f8;
    }
    .home-title {
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #1a1a2a;
      margin-bottom: 4px;
    }
    .home-subtitle {
      font-size: 11px;
      color: #9090a8;
      letter-spacing: 0.06em;
      margin-bottom: 36px;
    }
    .home-buttons {
      display: flex;
      gap: 16px;
    }
    .home-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 160px;
      height: 120px;
      background: #ffffff;
      border: 1px solid #c0c0cc;
      border-radius: 6px;
      color: #1a1a2a;
      text-decoration: none;
      font-family: monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      font-weight: bold;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s, background 0.12s;
    }
    .home-btn:hover {
      border-color: #4080e0;
      color: #1050c0;
      background: #ddeeff;
    }
    .home-btn .btn-icon {
      font-size: 28px;
      margin-bottom: 12px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="home-title">iPrime Presentation Tool</div>
  <div class="home-subtitle">AGV Layout &amp; Animation Suite</div>
  <div class="home-buttons">
    <a class="home-btn" href="cpicker.html">
      <span class="btn-icon">📍</span>
      Coord Picker
    </a>
    <a class="home-btn" href="animplayer.html">
      <span class="btn-icon">▶</span>
      Anim Player
    </a>
  </div>
</body>
</html>
